
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ubicaciones</title>
<style>
body{font-family:Arial;margin:30px}
table{border-collapse:collapse;width:100%;margin-top:20px}
th,td{border:1px solid #ccc;padding:8px}
button{padding:8px 12px}
</style>
</head>
<body>
<h2>Actualización de Ubicaciones</h2>
<input id="doc" type="number" placeholder="Doc. Identidad">
<button onclick="buscar()">Buscar</button>
<div id="msg"></div>
<table id="tbl"></table>
<button id="guardarBtn" style="display:none" onclick="guardar()">Guardar</button>

<script>
let pisos=[];
async function buscar(){
 let doc=document.getElementById('doc').value;
 let r=await fetch('/buscar?doc='+doc);
 let data=await r.json();
 pisos=data.pisos;
 let tbl=document.getElementById('tbl');
 tbl.innerHTML='';
 if(data.rows.length===0){tbl.innerHTML='<tr><td>No hay registros</td></tr>'; return;}
 let h='<tr><th>Etiqueta</th><th>Doc</th><th>Piso</th><th>Ubicación</th></tr>';
 for(let row of data.rows){
  h+=`<tr data-rid="${row.rid}">
  <td>${row['Etiqueta']||''}</td>
  <td>${row['Doc. Identidad']||''}</td>
  <td><select onchange="loadUbic(this)"><option value="">Seleccione</option>${pisos.map(p=>`<option ${row['PISO']==p?'selected':''}>${p}</option>`).join('')}</select></td>
  <td><select><option>${row['UBICACIÓN DETALLADA']||'Seleccione'}</option></select></td></tr>`;
 }
 tbl.innerHTML=h;
 document.getElementById('guardarBtn').style.display='inline';
}
async function loadUbic(sel){
 let piso=sel.value;
 let r=await fetch('/ubicaciones?piso='+encodeURIComponent(piso));
 let data=await r.json();
 let s=sel.parentElement.parentElement.cells[3].querySelector('select');
 s.innerHTML='<option value="">Seleccione</option>'+data.map(x=>`<option>${x}</option>`).join('');
}
async function guardar(){
 let rows=document.querySelectorAll('#tbl tr[data-rid]');
 let updates=[];
 for(let r of rows){
   let rid=r.dataset.rid;
   let piso=r.cells[2].querySelector('select').value;
   let ubi=r.cells[3].querySelector('select').value;
   if(!piso || !ubi){alert('Debe completar todas las filas'); return;}
   updates.push({rid,piso,ubicacion:ubi});
 }
 let res=await fetch('/guardar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({updates})});
 let d=await res.json();
 alert(d.msg);
 document.getElementById('doc').value='';
 document.getElementById('tbl').innerHTML='';
 document.getElementById('guardarBtn').style.display='none';
}
</script>
</body>
</html>
