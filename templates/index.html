<!doctype html><html><head><meta charset='utf-8'><title>Actualización Ciencias</title>
<style>
body{

    font-family:Arial;

    margin:30px;

    background-image:url('/static/fondo.jpg');

    background-size:cover;

    background-position:center;

    background-attachment:fixed;

    position:relative;

}

/* CAPA DIFUMINADA */
body::before{

    content:'';

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(255,255,255,0.55);

    backdrop-filter:blur(6px);

    z-index:-1;

}

table{

    border-collapse:collapse;

    width:100%;

    margin-top:15px;

    background:white;

}

th,td{

    border:1px solid #ccc;

    padding:8px;

}

button,input,select{

    padding:6px;

}

h2{

    color:#111;

}

 
</style>
</head><body>
<h2>Actualización de Ubicaciones Facultad de Ciencias</h2>
    <div style="
margin-top:20px;
margin-bottom:20px;
padding:15px;
background:white;
border-radius:10px;
border:1px solid #ccc;
">

<h3>Actualización Masiva</h3>

<select id="pisoMasivo" onchange="cargarUbicacionesMasivas()">

    <option value="">
        Seleccione Piso
    </option>

</select>

<select id="ubiMasiva">

    <option value="">
        Seleccione Ubicación
    </option>

</select>

<button onclick="aplicarTodos()">
    Aplicar a TODOS
</button>

<button onclick="aplicarSeleccionados()">
    Aplicar a Seleccionados
</button>

</div>
<input id='doc' placeholder='Digite Doc. Identidad'><button onclick='buscar()'>Buscar</button>
<table id='tbl'></table><br><button id='g' style='display:none' onclick='guardar()'>Guardar</button>
<script>
let pisos=[];
async function buscar(){
 let doc=document.getElementById('doc').value;
 let r=await fetch('/buscar?doc='+encodeURIComponent(doc));
 let d=await r.json(); pisos=d.pisos;
    document.getElementById('pisoMasivo').innerHTML=

    '<option value="">Seleccione Piso</option>'+

    pisos.map(p=>`

        <option value="${p}">
            ${p}
        </option>

    `).join('');
 let h=`
<tr>

<th>
✓
</th>

<th>
Etiqueta
</th>

<th>
Descr. Detallada
</th>

<th>
Departamento
</th>

<th>
Proyecto
</th>

<th>
Piso
</th>

<th>
Ubicación Detallada
</th>

</tr>
`;
 for(let row of d.rows){
 h+=`<tr data-rid="${row.rid}">
<td>
<input type="checkbox" class="chk">
</td>
 <td>${row['Etiqueta']||''}</td>
 <td>${row['Descr. Detallada']||''}</td>
 <td>${row['Departamento']||''}</td>
 <td>${row['Proyecto']||''}</td>
 <td><select onchange="loadU(this)"><option value="">Seleccione</option>${pisos.map(p=>`<option>${p}</option>`).join('')}</select></td>
 <td><select><option value="">Seleccione</option></select></td></tr>`;
 }
 document.getElementById('tbl').innerHTML=h;
 document.getElementById('g').style.display=d.rows.length?'inline':'none';
}
async function loadU(s){

    let r=await fetch(
        '/ubicaciones?piso='+
        encodeURIComponent(s.value)
    );

    let d=await r.json();

    let u=s.parentElement
            .parentElement
            .cells[6]
            .querySelector('select');

    u.innerHTML=
        '<option value="">Seleccione</option>'+

        d.map(x=>`

            <option value="${x}">
                ${x}
            </option>

        `).join('');
}
async function guardar(){
 let trs=document.querySelectorAll('#tbl tr[data-rid]'); let ups=[];
 for(let tr of trs){
 let p=tr.cells[5]
    .querySelector('select')
    .value;

let u=tr.cells[6]
    .querySelector('select')
    .value;
 if(!p||!u){alert('Debe completar todas las filas');return;}
 ups.push({rid:tr.dataset.rid,piso:p,ubicacion:u});
 }
 let r=await fetch('/guardar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({updates:ups})});
 let d=await r.json(); 
    alert(d.msg); 
    document.getElementById('doc').value='';

    document.getElementById('tbl').innerHTML='';

    document.getElementById('g').style.display='none';
}

    async function cargarUbicacionesMasivas(){

    let piso=document.getElementById(
        'pisoMasivo'
    ).value;

    let r=await fetch(
        '/ubicaciones?piso='+
        encodeURIComponent(piso)
    );

    let d=await r.json();

    document.getElementById(
        'ubiMasiva'
    ).innerHTML=

        '<option value="">Seleccione Ubicación</option>'+

        d.map(x=>`

            <option value="${x}">
                ${x}
            </option>

        `).join('');
}
    function aplicarTodos(){
    let trs=document.querySelectorAll(
        '#tbl tr[data-rid]'
    );

    trs.forEach(tr=>{

        tr.cells[5]
            .querySelector('select')
            .value=piso;

        tr.cells[6]
            .querySelector('select')
            .innerHTML=

            `<option selected>
                ${ubi}
            </option>`;
    });
}
    function aplicarSeleccionados(){

    let piso=document.getElementById(
        'pisoMasivo'
    ).value;

    let ubi=document.getElementById(
        'ubiMasiva'
    ).value;

    if(!piso || !ubi){

        alert(
            'Debe seleccionar piso y ubicación'
        );

        return;
    }

    let trs=document.querySelectorAll(
        '#tbl tr[data-rid]'
    );

    trs.forEach(tr=>{

        let chk=tr.querySelector('.chk');

        if(chk.checked){

            // PISO
            tr.cells[5]
                .querySelector('select')
                .value=piso;

            // UBICACION
            let uSelect=tr.cells[6]
                .querySelector('select');

            if(uSelect){

                uSelect.innerHTML=
                    `<option value="${ubi}" selected>
                        ${ubi}
                    </option>`;
            }
        }
    });
}
    let trs=document.querySelectorAll(
        '#tbl tr[data-rid]'
    );

    trs.forEach(tr=>{

        let chk=tr.querySelector('.chk');

        if(chk.checked){

            tr.cells[5]
                .querySelector('select')
                .value=piso;

            tr.cells[6]
                .querySelector('select')
                .innerHTML=

                `<option selected>
                    ${ubi}
                </option>`;
        }
    });
}
</script></body></html>
