
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ubicaciones</title>

<style>

body{
    font-family: Arial;
    margin:20px;
}

table{
    width:100%;
    border-collapse: collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
}

input,select,button{
    padding:8px;
}

button{
    cursor:pointer;
}

</style>

</head>
<body>

<h2>Búsqueda por Documento</h2>

<input type="text" id="doc" placeholder="Doc. Identidad">
<button onclick="buscar()">Buscar</button>

<table id="tabla">
    <thead>
        <tr>
            <th>Etiqueta</th>
            <th>Descr. Detallada</th>
            <th>Departamento</th>
            <th>Proyecto</th>
            <th>PISO</th>
            <th>UBICACIÓN DETALLADA</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<br>

<button onclick="guardar()">Guardar</button>

<script>

let pisos = []

async function cargarPisos(){

    let r = await fetch('/pisos')
    pisos = await r.json()

}

async function buscar(){

    let doc = document.getElementById('doc').value

    let r = await fetch('/buscar?doc=' + encodeURIComponent(doc))

    let data = await r.json()

    let tbody = document.querySelector('#tabla tbody')

    tbody.innerHTML=''

    for(let row of data){

        let tr = document.createElement('tr')

        let pisoOptions = pisos.map(p=>
            `<option ${p===row.piso?'selected':''}>${p}</option>`
        ).join('')

        tr.innerHTML=`
            <td>${row['Etiqueta'] || ''}</td>
            <td>${row['Descr. Detallada'] || ''}</td>
            <td>${row['Departamento'] || ''}</td>
            <td>${row['Proyecto'] || ''}</td>

            <td>
                <select class="piso" onchange="cargarUbicaciones(this)">
                    <option value="">Seleccione</option>
                    ${pisoOptions}
                </select>
            </td>

            <td>
                <select class="ubicacion"></select>
            </td>
        `

        tr.dataset.id = row.id

        tbody.appendChild(tr)

        await cargarUbicaciones(
            tr.querySelector('.piso'),
            row['UBICACIÓN DETALLADA']
        )
    }
}

async function cargarUbicaciones(selectPiso, valor=''){

    let piso = selectPiso.value

    let tr = selectPiso.closest('tr')

    let selectUb = tr.querySelector('.ubicacion')

    selectUb.innerHTML=''

    if(!piso) return

    let r = await fetch('/ubicaciones?piso=' + encodeURIComponent(piso))

    let data = await r.json()

    selectUb.innerHTML =
        '<option value="">Seleccione</option>' +
        data.map(u=>
            `<option ${u===valor?'selected':''}>${u}</option>`
        ).join('')
}

async function guardar(){

    let filas = document.querySelectorAll('#tabla tbody tr')

    let updates=[]

    for(let tr of filas){

        let piso = tr.querySelector('.piso').value
        let ubicacion = tr.querySelector('.ubicacion').value

        if(!piso || !ubicacion){

            alert('Debe completar todas las filas')

            return
        }

        updates.push({
            id: tr.dataset.id,
            piso,
            ubicacion
        })
    }

    let res = await fetch('/guardar',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({updates})
    })

    let data = await res.json()

    alert(data.msg)

    if(data.ok){

        document.querySelector('#tabla tbody').innerHTML=''
        document.getElementById('doc').value=''
    }
}

cargarPisos()

</script>

</body>
</html>
